name: CI/CD

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements-ci.txt'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Python deps
        run: pip install -r requirements-ci.txt

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Lint Python
        run: ruff check backend/

      - name: Lint TypeScript
        run: npm run lint
        working-directory: frontend

      - name: Test Python
        run: python -m pytest backend/tests/ -v

      - name: Test TypeScript
        run: npm run test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  build-exe:
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements-build.txt'

      - uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

      # requirements-build.txt includes certifi and fido2 which are imported
      # at parse time by icloud_sorter.spec — they must be installed before
      # PyInstaller runs.
      - name: Install build deps
        run: pip install --pre -r requirements-build.txt

      - name: Stamp beta
        run: python scripts/stamp_beta.py

      - name: Run PyInstaller
        run: pyinstaller icloud_sorter.spec --noconfirm

      - name: Verify exe exists
        run: |
          if (!(Test-Path dist\iCloudPhotoSorter\iCloudPhotoSorter.exe)) {
            Write-Error "iCloudPhotoSorter.exe not found"
            exit 1
          }

      - uses: actions/upload-artifact@v7
        with:
          name: iCloudPhotoSorter
          path: dist/iCloudPhotoSorter/

  release:
    needs: build-exe
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: iCloudPhotoSorter
          path: iCloudPhotoSorter

      - name: Zip artifact
        run: zip -r "iCloudPhotoSorter-${{ github.ref_name }}.zip" iCloudPhotoSorter/

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          repository: tokintmash/icloud-sorter-releases
          token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          generate_release_notes: true
          files: iCloudPhotoSorter-${{ github.ref_name }}.zip
