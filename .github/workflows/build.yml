name: CI/CD

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements-ci.txt'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Python deps
        run: pip install -r requirements-ci.txt

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Lint Python
        run: ruff check backend/

      - name: Lint TypeScript
        run: npm run lint
        working-directory: frontend

      - name: Test Python
        run: python -m pytest backend/tests/ -v

      - name: Test TypeScript
        run: npm run test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

  build-exe:
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements-build.txt'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

      # requirements-build.txt includes certifi and fido2 which are imported
      # at parse time by icloud_sorter.spec — they must be installed before
      # PyInstaller runs.
      - name: Install build deps
        run: pip install --pre -r requirements-build.txt

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 5.0.2
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Stamp beta
        run: python scripts/stamp_beta.py

      - name: Run PyInstaller
        run: pyinstaller icloud_sorter.spec --noconfirm

      - name: Verify exe exists
        run: |
          if (!(Test-Path dist\iCloudPhotoSorter\iCloudPhotoSorter.exe)) {
            Write-Error "iCloudPhotoSorter.exe not found"
            exit 1
          }

      - name: Resolve package version
        id: package-version
        shell: pwsh
        run: |
          $metadata = Get-Content -LiteralPath packaging\metadata.json -Raw | ConvertFrom-Json
          $version = $metadata.version
          if ('${{ github.ref }}'.StartsWith('refs/tags/v')) {
            $tagVersion = '${{ github.ref_name }}'.TrimStart('v')
            if ($tagVersion -match '^(?<msiVersion>\d{1,5}\.\d{1,5}\.\d{1,5})(?:[-+].*)?$') {
              $version = $Matches.msiVersion
            } else {
              $version = $tagVersion
            }
          }
          if ($version -notmatch '^\d{1,5}\.\d{1,5}\.\d{1,5}$') {
            Write-Error "MSI version must use numeric major.minor.patch format. Received: $version"
            exit 1
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build MSI
        run: .\scripts\build_msi.ps1 -SkipBuild -Version "${{ steps.package-version.outputs.version }}"

      - name: Verify MSI exists
        run: |
          $msi = Get-ChildItem -LiteralPath dist\installer -Filter *.msi | Select-Object -First 1
          if ($null -eq $msi) {
            Write-Error "MSI installer not found"
            exit 1
          }

      - uses: actions/upload-artifact@v7
        with:
          name: iCloudPhotoSorter
          path: dist/iCloudPhotoSorter/

      - uses: actions/upload-artifact@v7
        with:
          name: iCloudPhotoSorter-msi
          path: dist/installer/*.msi

  release:
    needs: build-exe
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: iCloudPhotoSorter-msi
          path: installer

      - name: Zip artifact
        run: zip -j "iCloudPhotoSorter-latest.zip" installer/*.msi

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          repository: tokintmash/icloud-sorter-releases
          token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          tag_name: latest
          name: Latest
          body: |
            Built from ${{ github.ref_name }}
          files: iCloudPhotoSorter-latest.zip
